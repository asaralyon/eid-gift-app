<style>
:root{--gold:#FFD700;--gold-light:#FFF0A0;--emerald:#22c55e;--emerald-dark:#16a34a;--bg:#050d1e;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:"Tajawal",sans-serif;}
/* ── GIF BACKGROUND (img tag to bypass hotlink) ── */
#gifBg{
position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;
object-fit:cover;
filter:brightness(.5) saturate(1.25);
pointer-events:none;
}
#bgOverlay{
position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
background:linear-gradient(to bottom,rgba(5,13,30,.55) 0%,rgba(5,13,30,.25) 40%,rgba(5,13,30,.7) 100%);
}
/* Music hidden */
#ytMusicWrap{position:fixed;top:-999px;left:-999px;width:1px;height:1px;overflow:hidden;pointer-events:none;z-index:0;}
/* Pattern */
.pat{position:fixed;top:0;left:0;width:100%;height:100%;opacity:.04;pointer-events:none;z-index:2;
background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0 L42 14 L52 4 L45 17 L60 13 L48 22 L60 27 L46 27 L52 40 L42 31 L40 46 L38 31 L28 40 L34 27 L20 27 L32 22 L20 13 L35 17 L28 4 L38 14 Z' fill='%23FFD700' opacity='.4'/%3E%3C/svg%3E");}
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:25;}
/* Audio play button (shown if autoplay blocked) */
#audioUnlock{
position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.4);
border-radius:50px;padding:9px 22px;font-family:"Tajawal",sans-serif;
font-size:.82rem;color:var(--gold);cursor:pointer;z-index:50;
display:none;backdrop-filter:blur(10px);
}
#app{position:relative;z-index:5;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.moon-wrap{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:6;animation:moonFloat 5s ease-in-out infinite alternate;}
.moon-wrap svg{width:66px;height:66px;}
@keyframes moonFloat{from{filter:drop-shadow(0 0 14px #FFD700) drop-shadow(0 0 28px #FFA500);transform:translateX(-50%) translateY(0);}to{filter:drop-shadow(0 0 28px #FFD700) drop-shadow(0 0 55px #FFA500);transform:translateX(-50%) translateY(-7px);}}
.lantern{position:absolute;top:-5px;z-index:5;}
.lantern-l{left:4px;}.lantern-r{right:4px;}
.lantern svg{animation:swing 4.5s ease-in-out infinite;transform-origin:top center;}
.lantern-r svg{animation-delay:-2.2s;}
@keyframes swing{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
align-items:center;justify-content:center;padding:14px;transition:opacity .65s ease,transform .65s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.96);}
#introScreen{gap:9px;}
.intro-title{text-align:center;margin-top:84px;}
.eid-ar-big{font-family:"Amiri",serif;font-size:2.8rem;color:var(--gold);direction:rtl;
text-shadow:0 0 34px rgba(255,215,0,.7);line-height:1.2;}
.eid-en-sub{font-family:"Cinzel Decorative",serif;font-size:.9rem;color:rgba(255,215,0,.6);letter-spacing:4px;margin-top:3px;}
#giftWrap{position:relative;cursor:pointer;animation:floatChar 3s ease-in-out infinite;margin:4px 0;}
#giftWrap::after{content:"";position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
width:100px;height:15px;background:radial-gradient(ellipse,rgba(255,215,0,.2),transparent);border-radius:50%;
animation:shadowOsc 3s ease-in-out infinite;}
@keyframes floatChar{0%,100%{transform:translateY(0);}50%{transform:translateY(-13px);}}
@keyframes shadowOsc{0%,100%{transform:translateX(-50%) scaleX(1);opacity:.4;}50%{transform:translateX(-50%) scaleX(.6);opacity:.15;}}
.eye-g{animation:blink 4.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.eye-g:last-of-type{animation-delay:.08s;}
@keyframes blink{0%,88%,100%{transform:scaleY(1);}93%{transform:scaleY(.08);}}
.from-label{font-size:.9rem;color:rgba(255,255,255,.5);text-align:center;direction:rtl;}
.from-label span{color:var(--gold);font-weight:700;}
.btn-open{background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));border:2px solid var(--gold);
color:#fff;cursor:pointer;font-family:"Tajawal",sans-serif;font-size:1rem;font-weight:700;
padding:15px 30px;border-radius:50px;box-shadow:0 0 28px rgba(34,197,94,.45);
transition:all .25s;animation:btnPulse 2.5s ease-in-out infinite;}
.btn-open:active{transform:scale(.97);}
.btn-open:disabled{opacity:.55;cursor:default;}
@keyframes btnPulse{0%,100%{box-shadow:0 0 28px rgba(34,197,94,.4);}50%{box-shadow:0 0 48px rgba(34,197,94,.75),0 0 90px rgba(255,215,0,.35);}}
#expScreen{justify-content:flex-start;padding-top:68px;gap:11px;}
.exp-gift{animation:floatChar 2.8s ease-in-out infinite;}
.sub-box{background:rgba(0,0,0,.7);backdrop-filter:blur(14px);border:1px solid rgba(255,215,0,.28);
border-radius:20px;padding:17px 24px;width:calc(100% - 26px);max-width:400px;min-height:94px;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;text-align:center;}
.sub-ar{font-family:"Amiri",serif;font-size:1.7rem;color:var(--gold);direction:rtl;line-height:1.35;
text-shadow:0 0 22px rgba(255,215,0,.45);transition:opacity .28s ease,transform .28s ease;}
.sub-ar.fade{opacity:0;transform:scale(.92);}
.sub-en{font-family:"Cinzel Decorative",serif;font-size:.62rem;color:rgba(255,255,255,.52);
letter-spacing:1.5px;transition:opacity .28s ease;}
.sub-en.fade{opacity:0;}
.vi{display:flex;align-items:flex-end;gap:3px;height:20px;opacity:0;transition:opacity .3s;}
.vi.on{opacity:1;}
.vi-b{width:4px;background:var(--gold);border-radius:2px;min-height:4px;transform:scaleY(.2);animation:viBar .55s ease-in-out infinite alternate;}
.vi-b:nth-child(1){animation-delay:.00s;height:55%;}
.vi-b:nth-child(2){animation-delay:.09s;height:100%;}
.vi-b:nth-child(3){animation-delay:.05s;height:75%;}
.vi-b:nth-child(4){animation-delay:.14s;height:90%;}
.vi-b:nth-child(5){animation-delay:.07s;height:60%;}
.vi-b:nth-child(6){animation-delay:.11s;height:100%;}
.vi-b:nth-child(7){animation-delay:.03s;height:70%;}
@keyframes viBar{from{transform:scaleY(.18);opacity:.4;}to{transform:scaleY(1);opacity:1;}}
.prog-bar{width:calc(100% - 26px);max-width:400px;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--emerald),var(--gold));border-radius:3px;width:0%;transition:width .15s linear;}
#endScreen{gap:13px;}
.end-ar{font-family:"Amiri",serif;font-size:3.2rem;color:var(--gold);direction:rtl;text-align:center;animation:glowPulse 2s ease-in-out infinite alternate;margin-top:80px;}
.end-en{font-family:"Cinzel Decorative",serif;font-size:1rem;color:var(--gold-light);letter-spacing:4px;text-align:center;}
@keyframes glowPulse{from{text-shadow:0 0 20px rgba(255,215,0,.5);}to{text-shadow:0 0 58px #FFD700,0 0 100px rgba(255,165,0,.4);}}
.sender-card{background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.34);border-radius:14px;padding:13px 28px;text-align:center;}
.sender-card .lbl{font-size:.7rem;color:rgba(255,255,255,.38);}
.sender-card .nm{font-family:"Cinzel Decorative",serif;font-size:1.1rem;color:var(--gold);letter-spacing:2px;margin:4px 0;}
.sender-card .nm-ar{font-family:"Amiri",serif;font-size:.92rem;color:rgba(255,215,0,.55);direction:rtl;}
.dua-text{font-family:"Amiri",serif;font-size:.9rem;color:rgba(255,215,0,.42);direction:rtl;text-align:center;padding:0 18px;line-height:1.8;}
.actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:310px;}
.btn-dl,.btn-wa,.btn-rp{border-radius:50px;cursor:pointer;font-family:"Tajawal",sans-serif;font-size:.88rem;padding:13px 20px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;}
.btn-dl{background:linear-gradient(135deg,#1a4a7a,#0b2a4a);border:1px solid rgba(255,215,0,.4);color:#fff;}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);border:none;color:#fff;}
.btn-rp{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);}
.btn-dl:hover,.btn-wa:hover{transform:translateY(-2px);}
.btn-dl:disabled{opacity:.5;cursor:default;transform:none;}
.burst{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;height:340px;
background:radial-gradient(circle,rgba(255,215,0,.62),transparent);border-radius:50%;
pointer-events:none;z-index:30;animation:burstAnim .8s ease forwards;}
@keyframes burstAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(0);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.4);}100%{opacity:0;transform:translate(-50%,-50%) scale(3);}}

<script>
/* CONFETTI */
const CC=document.getElementById("confettiCanvas"),ctx=CC.getContext("2d");let confetti=[];
function resizeCC(){CC.width=window.innerWidth;CC.height=window.innerHeight;}resizeCC();window.addEventListener("resize",resizeCC);
function launchConfetti(n){n=n||120;const c=["#FFD700","#FFA500","#22c55e","#fff","#87CEEB","#FF69B4","#4ade80","#FFF44F"];
for(let i=0;i<n;i++)confetti.push({x:Math.random()*CC.width,y:Math.random()>.5?-10:CC.height*.25*Math.random(),
w:Math.random()*9+4,h:Math.random()*5+2,c:c[~~(Math.random()*c.length)],
vx:(Math.random()-.5)*5,vy:Math.random()*4+1.5,rot:Math.random()*360,rs:(Math.random()-.5)*12,op:1,g:.07});}
(function dc(){ctx.clearRect(0,0,CC.width,CC.height);confetti=confetti.filter(c=>c.op>0);
confetti.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=c.g;c.rot+=c.rs;if(c.y>CC.height*.72)c.op=Math.max(0,c.op-.016);
ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot*Math.PI/180);ctx.globalAlpha=c.op;ctx.fillStyle=c.c;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();});requestAnimationFrame(dc);})();
/* YOUTUBE MUSIC */
let musicPlayer=null,musicReady=false,pendingMusic=false;
window.onYouTubeIframeAPIReady=function(){
musicPlayer=new YT.Player("ytMusic",{videoId:"aRQlU_9gm3o",
playerVars:{autoplay:0,mute:0,loop:1,controls:0,rel:0,modestbranding:1,playsinline:1,playlist:"aRQlU_9gm3o",origin:window.location.origin},
events:{onReady:function(e){musicReady=true;e.target.setVolume(30);if(pendingMusic)e.target.playVideo();}}});};
function startMusic(){if(!musicReady){pendingMusic=true;return;}try{musicPlayer.playVideo();}catch(e){}}
function stopMusic(){try{musicPlayer.stopVideo();}catch(e){}}
/* AUDIO */
const voice=document.getElementById("voiceAudio");
let audioUnlocked=false;
// Try to preload
voice.load();
function unlockAudio(){
voice.play().then(()=>{voice.pause();voice.currentTime=0;audioUnlocked=true;document.getElementById("audioUnlock").style.display="none";}).catch(()=>{});
}
function playVoice(){
voice.currentTime=0;
const p=voice.play();
if(p!==undefined){
p.then(()=>{audioUnlocked=true;document.getElementById("audioUnlock").style.display="none";})
.catch(()=>{
// Show unlock button
document.getElementById("audioUnlock").style.display="block";
// Fallback: listen for unlock click then re-play
document.getElementById("audioUnlock").onclick=function(){
voice.play();document.getElementById("audioUnlock").style.display="none";
};
});
}
}
/* SUBTITLE CUES */
const CUES=[
{t:0.0,  ar:"السلام عليكم!",            en:"Peace be upon you!",          boom:false,final:false},
{t:1.8,  ar:"أنا هدية عيد لك! 🎁",     en:"I am an Eid gift for you!",   boom:false,final:false},
{t:3.8,  ar:"أرسلني صفوان طالب",        en:"Safwan Taleb sent me…",       boom:false,final:false},
{t:5.8,  ar:"لأقول لك عيد مبارك ✨",   en:"to wish you Eid Mubarak!",    boom:true, final:false},
{t:8.2,  ar:"تقبّل الله منّا ومنكم",   en:"May Allah accept from us",    boom:false,final:false},
{t:11.0, ar:"الصيام والقيام 🌙",       en:"our fasting and prayers",     boom:false,final:false},
{t:13.2, ar:"وصالح الأعمال 🤲",        en:"and our good deeds",          boom:false,final:false},
{t:15.4, ar:"صفوان طالب",              en:"Safwan Taleb",                 boom:false,final:false},
{t:16.8, ar:"يتمنى لك ولعائلتك",       en:"wishes you and your family",  boom:false,final:false},
{t:17.8, ar:"عيداً سعيداً مباركاً 🌟", en:"a most blessed Eid",          boom:false,final:true }
];
let currentCue=-1,mouthTmr=null,endTriggered=false;
function setMouth(o){const p=o?"M 87 173 Q 105 197 123 173":"M 87 178 Q 105 192 123 178";
["mI","mE"].forEach(id=>{const e=document.getElementById(id);if(e)e.setAttribute("d",p);});}
function animMouth(on){clearInterval(mouthTmr);if(on){let o=false;mouthTmr=setInterval(()=>{o=!o;setMouth(o);},200);}else setMouth(false);}
function setSub(c){const sa=document.getElementById("subAr"),se=document.getElementById("subEn");
sa.classList.add("fade");se.classList.add("fade");
setTimeout(()=>{sa.textContent=c.ar;se.textContent=c.en;sa.classList.remove("fade");se.classList.remove("fade");},280);
if(c.boom)launchConfetti(110);}
voice.addEventListener("timeupdate",()=>{
const t=voice.currentTime,dur=voice.duration||19.5;
document.getElementById("progFill").style.width=Math.min(t/dur*100,100)+"%";
let active=-1;
for(let i=0;i<CUES.length;i++){if(t>=CUES[i].t)active=i;}
if(active>currentCue){currentCue=active;setSub(CUES[active]);
if(CUES[active].final&&!endTriggered){endTriggered=true;
launchConfetti(200);setTimeout(()=>launchConfetti(130),900);setTimeout(showEnd,2600);}}});
voice.addEventListener("play",()=>{animMouth(true);document.getElementById("vi").classList.add("on");});
voice.addEventListener("pause",()=>{animMouth(false);document.getElementById("vi").classList.remove("on");});
voice.addEventListener("ended",()=>{animMouth(false);document.getElementById("vi").classList.remove("on");if(!endTriggered){endTriggered=true;launchConfetti(180);setTimeout(showEnd,800);}});
/* SCREENS */
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");}
function openGift(){
document.getElementById("openBtn").disabled=true;
const b=document.createElement("div");b.className="burst";document.body.appendChild(b);setTimeout(()=>b.remove(),900);
startMusic();launchConfetti(80);
setTimeout(()=>{showScreen("expScreen");currentCue=-1;endTriggered=false;playVoice();},650);
}
function showEnd(){
animMouth(false);document.getElementById("vi").classList.remove("on");
document.getElementById("progFill").style.width="100%";
launchConfetti(190);setTimeout(()=>launchConfetti(120),800);
setTimeout(()=>showScreen("endScreen"),950);
}
function replay(){
stopMusic();voice.pause();voice.currentTime=0;
animMouth(false);document.getElementById("vi").classList.remove("on");
confetti=[];currentCue=-1;endTriggered=false;
document.getElementById("progFill").style.width="0%";
document.getElementById("openBtn").disabled=false;
showScreen("introScreen");
}
/* DOWNLOAD */
function downloadCard(){
const btn=document.getElementById("dlBtn");btn.textContent="⏳...";btn.disabled=true;
const c=document.createElement("div");c.style.cssText="position:fixed;left:-9999px;top:0;width:420px;height:720px;background:linear-gradient(160deg,#050d1e 0%,#0b1a38 50%,#0d2240 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:48px 32px;font-family:serif;";
c.innerHTML='<div style="font-size:70px;filter:drop-shadow(0 0 22px #FFD700)">🌙</div><div style="font-family:serif;font-size:3.2rem;color:#FFD700;text-align:center;text-shadow:0 0 32px #FFD700;direction:rtl;line-height:1.2">عيد مبارك</div><div style="font-size:1rem;color:rgba(255,215,0,.6);letter-spacing:5px;font-family:sans-serif">EID MUBARAK</div><div style="font-size:4.2rem">🎁</div><div style="background:rgba(255,215,0,.09);border:1px solid rgba(255,215,0,.38);border-radius:14px;padding:14px 30px;text-align:center"><div style="color:rgba(255,255,255,.38);font-size:.78rem;font-family:sans-serif">With love from</div><div style="color:#FFD700;font-size:1.2rem;letter-spacing:2px;font-family:sans-serif;margin:5px 0">Safwan Taleb</div><div style="color:rgba(255,215,0,.58);font-size:1rem;direction:rtl;font-family:serif">صفوان طالب</div></div><div style="color:rgba(255,215,0,.42);font-size:.88rem;text-align:center;direction:rtl;font-family:serif;line-height:1.9">تقبل الله منا ومنكم<br>الصيام والقيام وصالح الأعمال</div><div style="color:rgba(255,255,255,.18);font-size:.68rem;font-family:sans-serif">1446 ه</div>';
document.body.appendChild(c);
html2canvas(c,{backgroundColor:"#050d1e",scale:2.5,useCORS:true}).then(cv=>{const a=document.createElement("a");a.download="eid-mubarak-safwan.png";a.href=cv.toDataURL("image/png");a.click();c.remove();btn.textContent="✅ Téléchargée !";setTimeout(()=>{btn.textContent="📥 Télécharger la carte souvenir";btn.disabled=false;},3000);}).catch(()=>{c.remove();btn.textContent="📥 Télécharger la carte souvenir";btn.disabled=false;});
}
function shareWhatsApp(){
const msg=encodeURIComponent("🌙✨ عيد مبارك ✨🌙\nصفوان طالب يتمنى لك ولعائلتك عيداً سعيداً مباركاً 🎁\nتقبل الله منا ومنكم الصيام والقيام وصالح الأعمال 🤲\nSafwan Taleb wishes you a blessed Eid! 🌙\n🎁 "+window.location.href);
window.open("https://wa.me/?text="+msg,"_blank");
}
</script>
