<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎁 عيد مبارك • Eid Gift from Safwan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700;900&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════
   VARIABLES & RESET
════════════════════════════════════ */
:root{
  --gold:#FFD700;--gold-light:#FFF8C0;--gold-dark:#FFA500;
  --emerald:#22c55e;--emerald-dark:#16a34a;
  --navy:#050d1e;--navy2:#0b1a38;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Tajawal',sans-serif;background:var(--navy);color:#fff;}

/* ════════════════════════════════════
   ANIMATED FALLBACK BACKGROUND
════════════════════════════════════ */
#bgFallback{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(34,197,94,.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,165,0,.10) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(10,30,80,.8) 0%, transparent 100%),
    linear-gradient(160deg,#030810 0%,#060f26 40%,#08152e 100%);
  animation:bgShift 12s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%  {background:radial-gradient(ellipse at 20% 20%,rgba(34,197,94,.14) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,165,0,.12) 0%,transparent 50%),linear-gradient(160deg,#030810 0%,#060f26 40%,#08152e 100%);}
  100%{background:radial-gradient(ellipse at 75% 25%,rgba(255,215,0,.09) 0%,transparent 50%),radial-gradient(ellipse at 30% 75%,rgba(34,197,94,.10) 0%,transparent 50%),linear-gradient(160deg,#050d1e 0%,#091528 40%,#060f20 100%);}
}

/* ════════════════════════════════════
   YOUTUBE BACKGROUND
════════════════════════════════════ */
#ytBgWrap{
  position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none;
  opacity:0;transition:opacity 2s ease;
}
#ytBgWrap.loaded{opacity:1;}
#ytBgWrap::after{
  content:'';position:absolute;inset:0;z-index:2;
  background:linear-gradient(to bottom,
    rgba(3,8,20,.55) 0%,
    rgba(3,8,20,.20) 30%,
    rgba(3,8,20,.25) 70%,
    rgba(3,8,20,.75) 100%);
}
#ytBgIframe{
  position:absolute;top:50%;left:50%;
  width:max(56.26vh,100vw);
  height:max(100vh,177.78vw);
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* ════════════════════════════════════
   HIDDEN MUSIC
════════════════════════════════════ */
#ytMusicWrap{
  position:fixed;top:-400px;left:-400px;
  width:1px;height:1px;overflow:hidden;
  pointer-events:none;z-index:0;
}

/* ════════════════════════════════════
   CANVASES
════════════════════════════════════ */
#starCanvas{position:fixed;inset:0;z-index:3;pointer-events:none;}
#confettiCanvas{position:fixed;inset:0;z-index:23;pointer-events:none;}

/* ════════════════════════════════════
   ISLAMIC PATTERN OVERLAY
════════════════════════════════════ */
.pattern-overlay{
  position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.055;
  background-image:url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 5 L53 20 L65 8 L57 22 L72 18 L60 28 L74 32 L60 33 L66 50 L54 40 L50 55 L46 40 L34 50 L40 33 L26 32 L40 28 L28 18 L43 22 L35 8 L47 20Z' fill='%23FFD700' opacity='0.6'/%3E%3Ccircle cx='50' cy='50' r='8' fill='none' stroke='%23FFD700' stroke-width='0.5' opacity='0.4'/%3E%3C/svg%3E");
  background-size:100px 100px;
}

/* ════════════════════════════════════
   APP CONTAINER
════════════════════════════════════ */
#app{
  position:relative;z-index:4;
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;overflow:hidden;
}

/* ════════════════════════════════════
   MOON
════════════════════════════════════ */
.moon-wrap{
  position:absolute;top:16px;left:50%;
  transform:translateX(-50%);z-index:5;
  animation:moonFloat 5s ease-in-out infinite alternate;
}
.moon-wrap svg{width:60px;height:60px;}
@keyframes moonFloat{
  from{filter:drop-shadow(0 0 20px #FFD700) drop-shadow(0 0 40px #FFA500);
       transform:translateX(-50%) translateY(0);}
  to  {filter:drop-shadow(0 0 38px #FFD700) drop-shadow(0 0 75px #FFA500);
       transform:translateX(-50%) translateY(-8px);}
}

/* ════════════════════════════════════
   LANTERNS
════════════════════════════════════ */
.lantern{position:absolute;top:-5px;z-index:5;}
.lantern-l{left:4px;}
.lantern-r{right:4px;}
.lantern svg{
  animation:swing 4.5s ease-in-out infinite;
  transform-origin:top center;
  filter:drop-shadow(0 0 12px rgba(255,160,0,.6));
}
.lantern-r svg{animation-delay:-2.2s;}
@keyframes swing{
  0%,100%{transform:rotate(-6deg);}
  50%    {transform:rotate(6deg);}
}

/* ════════════════════════════════════
   SCREENS
════════════════════════════════════ */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;
  transition:opacity .7s cubic-bezier(.4,0,.2,1),
             transform .7s cubic-bezier(.4,0,.2,1);
}
.screen.hidden{
  opacity:0;pointer-events:none;transform:scale(.95) translateY(12px);
}

/* ════════════════════════════════════
   INTRO SCREEN
════════════════════════════════════ */
#introScreen{gap:12px;}
.intro-title{text-align:center;margin-top:78px;}
.eid-ar-big{
  font-family:'Amiri',serif;font-size:2.9rem;
  color:var(--gold);direction:rtl;line-height:1.2;
  text-shadow:0 0 50px rgba(255,215,0,.9),0 0 100px rgba(255,165,0,.4);
  animation:titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleGlow{
  from{text-shadow:0 0 30px rgba(255,215,0,.7),0 0 60px rgba(255,165,0,.3);}
  to  {text-shadow:0 0 60px rgba(255,215,0,1),0 0 120px rgba(255,165,0,.6),0 0 180px rgba(255,200,0,.2);}
}
.eid-en-sub{
  font-family:'Cinzel Decorative',serif;font-size:.82rem;
  color:rgba(255,215,0,.55);letter-spacing:5px;margin-top:5px;
}

/* ════════════════════════════════════
   GIFT IMAGE (AI Generated)
════════════════════════════════════ */
.gift-img-wrap{
  position:relative;cursor:pointer;
  animation:floatChar 3.2s ease-in-out infinite;
  margin:4px 0;
}
.gift-img-wrap img{
  width:200px;height:200px;
  object-fit:contain;
  filter:drop-shadow(0 0 30px rgba(255,215,0,.5)) drop-shadow(0 0 60px rgba(34,197,94,.3));
  border-radius:20px;
}
.gift-img-wrap::after{
  content:'';position:absolute;
  bottom:-18px;left:50%;
  transform:translateX(-50%);
  width:120px;height:16px;
  background:radial-gradient(ellipse,rgba(255,215,0,.35),transparent);
  border-radius:50%;
  animation:shadowOsc 3.2s ease-in-out infinite;
}
@keyframes floatChar{
  0%,100%{transform:translateY(0);}
  50%    {transform:translateY(-16px);}
}
@keyframes shadowOsc{
  0%,100%{transform:translateX(-50%) scaleX(1);opacity:.5;}
  50%    {transform:translateX(-50%) scaleX(.6);opacity:.2;}
}

/* ════════════════════════════════════
   SVG GIFT FALLBACK (exp screen)
════════════════════════════════════ */
.exp-gift-wrap{
  position:relative;
  animation:floatChar 2.8s ease-in-out infinite;
}
.eye-g{
  animation:blink 4.5s ease-in-out infinite;
  transform-box:fill-box;transform-origin:center;
}
.eye-g.r{animation-delay:.08s;}
@keyframes blink{
  0%,88%,100%{transform:scaleY(1);}
  93%{transform:scaleY(.08);}
}

/* ════════════════════════════════════
   FROM LABEL
════════════════════════════════════ */
.from-label{
  font-size:.88rem;color:rgba(255,255,255,.6);
  text-align:center;direction:rtl;
  text-shadow:0 2px 12px rgba(0,0,0,.95);
}
.from-label span{color:var(--gold);font-weight:700;}

/* ════════════════════════════════════
   OPEN BUTTON
════════════════════════════════════ */
.btn-open{
  background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));
  border:2px solid var(--gold);color:#fff;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:1.05rem;font-weight:700;
  padding:16px 36px;border-radius:50px;
  animation:btnPulse 2.5s ease-in-out infinite;
  transition:transform .18s;
  box-shadow:0 0 30px rgba(34,197,94,.35),0 0 60px rgba(255,215,0,.12);
}
.btn-open:active{transform:scale(.96);}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 28px rgba(34,197,94,.4),0 0 55px rgba(255,215,0,.12);}
  50%    {box-shadow:0 0 52px rgba(34,197,94,.75),0 0 100px rgba(255,215,0,.3);}
}

/* ════════════════════════════════════
   MUSIC BUTTON
════════════════════════════════════ */
#musicBtn{
  position:fixed;bottom:14px;right:14px;z-index:50;
  background:rgba(3,8,20,.7);
  border:1px solid rgba(255,215,0,.4);
  border-radius:50%;width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.2rem;
  backdrop-filter:blur(12px);
  transition:all .25s;
  box-shadow:0 0 20px rgba(255,215,0,.15);
}
#musicBtn:hover{
  background:rgba(255,215,0,.18);
  border-color:var(--gold);
}

/* ════════════════════════════════════
   EXPERIENCE SCREEN
════════════════════════════════════ */
#expScreen{
  justify-content:flex-start;
  padding-top:72px;gap:10px;
}

/* ════════════════════════════════════
   NAME BADGE
════════════════════════════════════ */
.name-badge{
  background:linear-gradient(135deg,rgba(255,215,0,.14),rgba(255,165,0,.08));
  border:1px solid rgba(255,215,0,.4);
  border-radius:12px;padding:6px 22px;
  font-family:'Cinzel Decorative',serif;
  font-size:.78rem;color:var(--gold);letter-spacing:2px;
  opacity:0;transition:opacity .5s ease,transform .5s ease;
  transform:translateY(6px);
  box-shadow:0 0 20px rgba(255,215,0,.1);
}
.name-badge.vis{opacity:1;transform:translateY(0);}

/* ════════════════════════════════════
   VOICE INDICATOR
════════════════════════════════════ */
.voice-indicator{
  display:flex;align-items:flex-end;justify-content:center;
  gap:3px;height:24px;
  opacity:0;transition:opacity .3s;
}
.voice-indicator.active{opacity:1;}
.vi-bar{
  width:4px;background:var(--gold);border-radius:2px;
  animation:viPulse 0.6s ease-in-out infinite alternate;
  min-height:4px;
}
.vi-bar:nth-child(1){animation-delay:0s;   height:60%;}
.vi-bar:nth-child(2){animation-delay:.1s;  height:100%;}
.vi-bar:nth-child(3){animation-delay:.05s; height:80%;}
.vi-bar:nth-child(4){animation-delay:.15s; height:90%;}
.vi-bar:nth-child(5){animation-delay:.07s; height:65%;}
.vi-bar:nth-child(6){animation-delay:.12s; height:100%;}
.vi-bar:nth-child(7){animation-delay:.03s; height:75%;}
@keyframes viPulse{
  from{transform:scaleY(.25);opacity:.4;}
  to  {transform:scaleY(1);  opacity:1;}
}

/* ════════════════════════════════════
   SUBTITLE BOX
════════════════════════════════════ */
.sub-box{
  background:rgba(3,8,20,.72);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,215,0,.28);
  border-radius:20px;
  padding:16px 24px;
  width:calc(100% - 28px);max-width:420px;
  min-height:96px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:7px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 40px rgba(255,215,0,.06);
  position:relative;overflow:hidden;
}
.sub-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.5),transparent);
}
.sub-ar{
  font-family:'Amiri',serif;font-size:1.7rem;
  color:var(--gold);direction:rtl;line-height:1.4;
  transition:opacity .3s ease,transform .3s ease;
}
.sub-en{
  font-family:'Cinzel Decorative',serif;font-size:.6rem;
  color:rgba(255,255,255,.42);letter-spacing:1.8px;
  transition:opacity .3s ease;
}
.sub-ar.fade,.sub-en.fade{opacity:0;transform:translateY(4px);}

/* ════════════════════════════════════
   PROGRESS BAR
════════════════════════════════════ */
.prog-wrap{
  width:calc(100% - 28px);max-width:420px;
}
.prog-steps{
  display:flex;justify-content:space-between;
  margin-bottom:5px;
}
.prog-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.15);
  transition:background .4s,box-shadow .4s;
}
.prog-dot.done{
  background:var(--gold);
  box-shadow:0 0 8px rgba(255,215,0,.6);
}
.prog-bar{
  width:100%;height:3px;
  background:rgba(255,255,255,.07);
  border-radius:3px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--emerald),var(--gold));
  border-radius:3px;width:0%;
  transition:width .25s linear;
}

/* ════════════════════════════════════
   END SCREEN
════════════════════════════════════ */
#endScreen{gap:14px;}
.end-ar{
  font-family:'Amiri',serif;font-size:3.4rem;
  color:var(--gold);direction:rtl;text-align:center;
  animation:glowPulse 2s ease-in-out infinite alternate;
  margin-top:72px;
  text-shadow:0 0 40px rgba(255,215,0,.7);
}
.end-en{
  font-family:'Cinzel Decorative',serif;font-size:1rem;
  color:var(--gold-light);letter-spacing:5px;text-align:center;
}
@keyframes glowPulse{
  from{text-shadow:0 0 25px rgba(255,215,0,.55);}
  to  {text-shadow:0 0 60px #FFD700,0 0 110px rgba(255,165,0,.5);}
}
.sender-card{
  background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,165,0,.06));
  border:1px solid rgba(255,215,0,.38);
  border-radius:16px;padding:14px 34px;text-align:center;
  box-shadow:0 0 30px rgba(255,215,0,.08);
}
.sender-card .lbl{font-size:.72rem;color:rgba(255,255,255,.38);}
.sender-card .name{
  font-family:'Cinzel Decorative',serif;font-size:1.15rem;
  color:var(--gold);letter-spacing:2px;margin:5px 0;
}
.sender-card .ar-name{
  font-family:'Amiri',serif;font-size:1rem;
  color:rgba(255,215,0,.58);direction:rtl;
}
.dua-text{
  font-family:'Amiri',serif;font-size:.92rem;
  color:rgba(255,215,0,.44);direction:rtl;
  text-align:center;padding:0 18px;line-height:2;
}

/* ════════════════════════════════════
   ACTION BUTTONS
════════════════════════════════════ */
.actions{
  display:flex;flex-direction:column;gap:11px;
  width:100%;max-width:330px;
}
.btn-dl,.btn-wa,.btn-rp{
  border-radius:50px;cursor:pointer;
  font-family:'Tajawal',sans-serif;font-size:.9rem;
  padding:14px 22px;
  display:flex;align-items:center;justify-content:center;
  gap:8px;
  transition:transform .2s,box-shadow .2s;
}
.btn-dl{
  background:linear-gradient(135deg,#1a4a7a,#0b2a4a);
  border:1px solid rgba(255,215,0,.45);color:#fff;
}
.btn-dl:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(26,74,122,.5);
}
.btn-wa{
  background:linear-gradient(135deg,#25D366,#128C7E);
  border:none;color:#fff;
}
.btn-wa:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 26px rgba(37,211,102,.45);
}
.btn-rp{
  background:transparent;
  border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.5);
}
.btn-rp:hover{
  border-color:rgba(255,255,255,.55);color:#fff;
}
.btn-dl:disabled{opacity:.5;cursor:default;transform:none;}

/* ════════════════════════════════════
   BURST
════════════════════════════════════ */
.burst{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:360px;height:360px;
  background:radial-gradient(circle,rgba(255,215,0,.7),transparent);
  border-radius:50%;pointer-events:none;z-index:20;
  animation:burstAnim .9s cubic-bezier(.22,.61,.36,1) forwards;
}
@keyframes burstAnim{
  0%  {opacity:0;transform:translate(-50%,-50%) scale(0);}
  40% {opacity:1;transform:translate(-50%,-50%) scale(1.4);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(3.5);}
}

/* ════════════════════════════════════
   FLOATING PARTICLES CSS
════════════════════════════════════ */
.float-particle{
  position:fixed;pointer-events:none;z-index:2;
  font-size:1.2rem;opacity:.6;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%  {transform:translateY(0) rotate(0deg);opacity:.6;}
  100%{transform:translateY(-110vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<!-- ═══ ANIMATED FALLBACK BG ═══ -->
<div id="bgFallback"></div>

<!-- ═══ YOUTUBE BG VIDEO ═══ -->
<div id="ytBgWrap">
  <iframe id="ytBgIframe"
    src="about:blank"
    data-src="https://www.youtube.com/embed/AjtVw2DZhWE?autoplay=1&mute=1&loop=1&playlist=AjtVw2DZhWE&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&playsinline=1&disablekb=1&enablejsapi=1"
    frameborder="0"
    allow="autoplay;encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<!-- ═══ HIDDEN MUSIC ═══ -->
<div id="ytMusicWrap">
  <iframe id="ytMusicIframe" src="about:blank"
    frameborder="0" allow="autoplay;encrypted-media" allowfullscreen>
  </iframe>
</div>

<!-- ═══ CANVASES ═══ -->
<canvas id="starCanvas"></canvas>
<div class="pattern-overlay"></div>
<canvas id="confettiCanvas"></canvas>

<!-- ═══ MUSIC BUTTON ═══ -->
<div id="musicBtn" onclick="toggleMusic()" title="Musique">🎵</div>

<!-- ═══ ARABIC AUDIO ELEMENTS ═══ -->
<audio id="aud0" preload="auto" crossorigin="anonymous"></audio>
<audio id="aud1" preload="auto" crossorigin="anonymous"></audio>
<audio id="aud2" preload="auto" crossorigin="anonymous"></audio>
<audio id="aud3" preload="auto" crossorigin="anonymous"></audio>
<audio id="aud4" preload="auto" crossorigin="anonymous"></audio>
<audio id="aud5" preload="auto" crossorigin="anonymous"></audio>

<div id="app">

  <!-- ════ MOON ════ -->
  <div class="moon-wrap">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="mg" cx="38%" cy="32%">
          <stop offset="0%" stop-color="#FFFAD0"/>
          <stop offset="55%" stop-color="#FFD700"/>
          <stop offset="100%" stop-color="#FFA500"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="42" fill="url(#mg)"/>
      <circle cx="68" cy="40" r="34" fill="#050d1e"/>
    </svg>
  </div>

  <!-- ════ LANTERN LEFT ════ -->
  <div class="lantern lantern-l">
    <svg width="50" height="122" viewBox="0 0 52 125" xmlns="http://www.w3.org/2000/svg">
      <defs><filter id="lga"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <line x1="26" y1="0" x2="26" y2="18" stroke="#FFD700" stroke-width="1.5"/>
      <rect x="10" y="18" width="32" height="7" rx="3.5" fill="#b07000"/>
      <ellipse cx="26" cy="63" rx="21" ry="36" fill="#E87000" opacity=".88" filter="url(#lga)"/>
      <ellipse cx="26" cy="63" rx="16" ry="30" fill="#FFA500" opacity=".65"/>
      <ellipse cx="26" cy="63" rx="9" ry="20" fill="#FFD700" opacity=".4">
        <animate attributeName="opacity" values=".3;.7;.3" dur="1.8s" repeatCount="indefinite"/>
      </ellipse>
      <line x1="14" y1="38" x2="38" y2="38" stroke="#a06000" stroke-width=".8" opacity=".7"/>
      <line x1="10" y1="63" x2="42" y2="63" stroke="#a06000" stroke-width=".8" opacity=".7"/>
      <line x1="14" y1="88" x2="38" y2="88" stroke="#a06000" stroke-width=".8" opacity=".7"/>
      <rect x="10" y="97" width="32" height="7" rx="3.5" fill="#b07000"/>
      <line x1="26" y1="104" x2="26" y2="118" stroke="#FFD700" stroke-width="1.5"/>
      <circle cx="26" cy="121" r="4" fill="#FFD700"/>
    </svg>
  </div>

const AUDIO_DATA = [

  { url:'https://www.genspark.ai/api/files/s/x27R1hw1', dur:3636, pause:750 },

  { url:'https://www.genspark.ai/api/files/s/IGl5Ym7B', dur:7344, pause:1500 },
];

/* ════════════════════════════════════════════════
   SCRIPT LINES
════════════════════════════════════════════════ */
const LINES = [
  { ar:'السلام عليكم ورحمة الله وبركاته!',
    en:'Peace be upon you, and God\'s mercy!',
    dot:0 },
  { ar:'أنا هديّتك في هذا العيد المبارك! 🎁',
    en:'I\'m your gift on this blessed Eid!',
    dot:1 },
  { ar:'أرسلني صفوان طالب...',
    en:'Safwan Taleb sent me...',
    dot:2, badge:true },
  { ar:'ليقول لك من القلب: عيد مبارك! ✨',
    en:'To wish you from the heart: Eid Mubarak!',
    dot:3, boom:true },
  { ar:'تقبّل الله منّا ومنكم الصيام والقيام وصالح الأعمال',
    en:'May Allah accept our fasting, prayers & good deeds',
    dot:4 },
  { ar:'صفوان طالب يتمنى لك ولعائلتك الكريمة عيداً سعيداً مباركاً! 🌙',
    en:'Safwan Taleb wishes you & your family a blessed Eid!',
    dot:5, final:true },
];

/* ════════════════════════════════════════════════
   TOTAL DURATION (for progress bar)
════════════════════════════════════════════════ */
const TOTAL_MS = AUDIO_DATA.reduce((s,l)=>s+l.dur+l.pause,0); // ~31 228ms

/* ════════════════════════════════════════════════
   AUDIO ELEMENTS
════════════════════════════════════════════════ */
const audEls = AUDIO_DATA.map((d,i)=>{
  const el = document.getElementById('aud'+i);
  el.src = d.url;
  return el;
});

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
let progTimer=null, progStart=0;
let mouthTmr=null;
let musicLoaded=false, musicOn=false;
let currentLine=-1;
let stars=[], frame=0, confetti=[];

/* ════════════════════════════════════════════════
   CANVAS
════════════════════════════════════════════════ */
const SC=document.getElementById('starCanvas'),  sx=SC.getContext('2d');
const CC=document.getElementById('confettiCanvas'), cx=CC.getContext('2d');

function resize(){
  SC.width=CC.width=window.innerWidth;
  SC.height=CC.height=window.innerHeight;
}

function initStars(){
  stars=[];
  for(let i=0;i<110;i++) stars.push({
    x:Math.random()*SC.width, y:Math.random()*SC.height,
    r:Math.random()*1.8+.3, op:Math.random()*.5+.1,
    spd:Math.random()*.02+.004, off:Math.random()*Math.PI*2,
    type:Math.random()<.08?'star':'dot'
  });
}

function drawStar(x,y,r,col){
  sx.save();sx.translate(x,y);
  sx.fillStyle=col;
  for(let i=0;i<5;i++){
    sx.rotate((Math.PI*2)/5);
    sx.moveTo(0,0);
    sx.lineTo(0,-r);
  }
  sx.restore();
}

function drawBg(){
  sx.clearRect(0,0,SC.width,SC.height);
  frame++;
  stars.forEach(s=>{
    const tw=Math.sin(frame*s.spd+s.off)*.48+.52;
    if(s.type==='star'){
      // Draw tiny 4-pointed star
      sx.save();sx.translate(s.x,s.y);
      sx.fillStyle=`rgba(255,248,200,${s.op*tw})`;
      sx.beginPath();
      const r1=s.r*2, r2=s.r*.6;
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4, r=i%2===0?r1:r2;
        i===0?sx.moveTo(Math.cos(a)*r,Math.sin(a)*r):sx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      sx.closePath();sx.fill();sx.restore();
    } else {
      sx.beginPath();sx.arc(s.x,s.y,s.r,0,Math.PI*2);
      sx.fillStyle=`rgba(255,248,200,${s.op*tw})`;
      sx.fill();
    }
  });
  requestAnimationFrame(drawBg);
}

/* ════════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════════ */
const CONF_COLS=['#FFD700','#FFA500','#22c55e','#fff','#87CEEB','#FF69B4','#4ade80','#FFF44F','#FF8C00'];
const CONF_SHAPES=['rect','circle','star'];

function launchConfetti(n=120){
  for(let i=0;i<n;i++) confetti.push({
    x:Math.random()*CC.width,
    y:Math.random()>.5?-10:CC.height*.2*Math.random(),
    w:Math.random()*10+4, h:Math.random()*6+2,
    c:CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)],
    shape:CONF_SHAPES[Math.floor(Math.random()*CONF_SHAPES.length)],
    vx:(Math.random()-.5)*6, vy:Math.random()*4.5+.5,
    rot:Math.random()*360, rs:(Math.random()-.5)*14,
    op:1, g:.055
  });
}

function drawConfetti(){
  cx.clearRect(0,0,CC.width,CC.height);
  confetti=confetti.filter(c=>c.op>.02);
  confetti.forEach(c=>{
    c.x+=c.vx; c.y+=c.vy; c.vy+=c.g; c.rot+=c.rs;
    if(c.y>CC.height*.6) c.op=Math.max(0,c.op-.018);
    cx.save();cx.translate(c.x,c.y);cx.rotate(c.rot*Math.PI/180);
    cx.globalAlpha=c.op;cx.fillStyle=c.c;
    if(c.shape==='circle'){
      cx.beginPath();cx.arc(0,0,c.w/2,0,Math.PI*2);cx.fill();
    } else if(c.shape==='star'){
      cx.beginPath();
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5-Math.PI/2;
        const b=a+Math.PI/5;
        i===0?cx.moveTo(Math.cos(a)*c.w/2,Math.sin(a)*c.w/2):cx.lineTo(Math.cos(a)*c.w/2,Math.sin(a)*c.w/2);
        cx.lineTo(Math.cos(b)*c.h/2,Math.sin(b)*c.h/2);
      }
      cx.closePath();cx.fill();
    } else {
      cx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    }
    cx.restore();
  });
  requestAnimationFrame(drawConfetti);
}

/* ════════════════════════════════════════════════

    ?'M 87 172 Q 105 198 123 172'
    :'M 87 178 Q 105 193 123 178';

/* ════════════════════════════════════════════════
   PROGRESS
════════════════════════════════════════════════ */
function startProgress(){
  progStart=Date.now();
  clearInterval(progTimer);
  progTimer=setInterval(()=>{
    const pct=Math.min((Date.now()-progStart)/TOTAL_MS*100,100);
    document.getElementById('progFill').style.width=pct+'%';
    if(pct>=100) clearInterval(progTimer);
  },100);
}

function markDot(idx){
  const dot=document.getElementById('pd'+idx);
  if(dot) dot.classList.add('done');
}

/* ════════════════════════════════════════════════
   AUDIO PLAYBACK CHAIN
════════════════════════════════════════════════ */
function playLine(idx){
  if(idx>=LINES.length){
    // All lines done → show end
    setVoice(false); animMouth(false);
    setTimeout(showEnd, 1200);
    return;
  }

  const line=LINES[idx];
  const aud=audEls[idx];
  const data=AUDIO_DATA[idx];
  currentLine=idx;

  // Update subtitle
  updateSubtitle(line.ar, line.en);

  // Mark progress dot
  markDot(line.dot);

  // Special effects
  if(line.badge) setTimeout(()=>document.getElementById('nameBadge').classList.add('vis'),300);
  if(line.boom){
    setTimeout(()=>launchConfetti(110), 200);
    setTimeout(()=>launchConfetti(80),  1200);
  }

  // Try to play audio
  const playPromise = aud.play();

  if(playPromise!==undefined){
    playPromise.then(()=>{
      // Audio playing
      animMouth(true);
      setVoice(true);

      aud.onended=()=>{
        animMouth(false);
        setVoice(false);
        setTimeout(()=>playLine(idx+1), data.pause);
      };

      // Safety: fallback timeout in case onended doesn't fire
      const fallbackMs = data.dur + data.pause + 1500;
      aud._fallback = setTimeout(()=>{
        if(currentLine===idx){
          animMouth(false);setVoice(false);
          playLine(idx+1);
        }
      }, fallbackMs);
      aud.onended=()=>{
        clearTimeout(aud._fallback);
        animMouth(false);setVoice(false);
        setTimeout(()=>playLine(idx+1), data.pause);
      };
    }).catch(()=>{
      // Autoplay blocked – use timer fallback
      animMouth(true);setVoice(true);
      setTimeout(()=>{
        animMouth(false);setVoice(false);
        setTimeout(()=>playLine(idx+1), data.pause);
      }, data.dur);
    });
  } else {
    // Old browsers
    animMouth(true);setVoice(true);
    setTimeout(()=>{
      animMouth(false);setVoice(false);
      setTimeout(()=>playLine(idx+1), data.pause);
    }, data.dur);
  }
}

/* ════════════════════════════════════════════════
   SCREEN MANAGEMENT
════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function openGift(){
  // Burst effect
  const b=document.createElement('div');b.className='burst';
  document.body.appendChild(b);setTimeout(()=>b.remove(),1000);

  // Start BG video
  loadBgVideo();

  // Start music
  loadMusic();

  // Confetti burst
  launchConfetti(85);

  // Transition to experience screen
  setTimeout(()=>{
    showScreen('expScreen');
    // Reset progress
    document.getElementById('progFill').style.width='0%';
    document.querySelectorAll('.prog-dot').forEach(d=>d.classList.remove('done'));
    document.getElementById('nameBadge').classList.remove('vis');
    // Start audio chain
    startProgress();
    playLine(0);
  }, 750);
}

function showEnd(){
  clearInterval(progTimer);
  animMouth(false);setVoice(false);
  document.getElementById('progFill').style.width='100%';
  launchConfetti(180);
  setTimeout(()=>launchConfetti(120),700);
  setTimeout(()=>showScreen('endScreen'),900);
}

function replay(){
  clearInterval(progTimer);
  animMouth(false);setVoice(false);
  confetti=[];
  currentLine=-1;
  // Stop all audio
  audEls.forEach(a=>{a.pause();a.currentTime=0;});
  document.getElementById('progFill').style.width='0%';
  document.getElementById('nameBadge').classList.remove('vis');
  showScreen('introScreen');
}
