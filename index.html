<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎁 Aïd Moubarak | Safwan Taleb</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Montserrat:wght@300;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E498;
            --emerald: #065f46;
            --cream: #FFFCF5;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--cream); 
            font-family: 'Tajawal', sans-serif; 
            overflow: hidden; 
            height: 100dvh; 
            color: var(--emerald);
        }

        /* ── ARRIÈRE-PLAN JOYEUX (Non-flou) ── */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at top right, #fff9e6 0%, var(--cream) 100%);
        }

        #ytBgIframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vh; height: 100dvh; 
            transform: translate(-50%, -50%) scale(2.5);
            opacity: 0.15; /* Très léger pour laisser le côté "joyeux/clair" dominer */
            pointer-events: none;
        }

        /* ── INTERFACE ── */
        #app {
            position: relative;
            z-index: 10;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px 60px;
            text-align: center;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

        /* ── TITRES ── */
        .eid-title {
            font-family: 'Amiri', serif;
            font-size: clamp(3rem, 15vw, 5rem);
            color: var(--emerald);
            text-shadow: 2px 2px 0px rgba(212, 175, 55, 0.3);
            margin-bottom: 0;
        }

        /* ── CADEAU PREMIUM (SVG) ── */
        .gift-container {
            position: relative;
            width: 80vw;
            max-width: 320px;
            animation: float 4s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* ── VOICE INDICATOR (Premium Look) ── */
        .equalizer {
            display: flex;
            gap: 4px;
            height: 30px;
            align-items: flex-end;
            margin: 20px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .equalizer.active { opacity: 1; }
        .bar {
            width: 4px;
            background: var(--gold);
            border-radius: 2px;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }
        @keyframes bounce { from { height: 5px; } to { height: 25px; } }

        /* ── CARTES DE MESSAGE ── */
        .msg-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid #fff;
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 380px;
        }

        .ar-text { font-family: 'Amiri', serif; font-size: 2rem; margin-bottom: 10px; }
        .fr-text { font-size: 1rem; font-weight: 300; opacity: 0.8; }

        /* ── BOUTONS ── */
        .btn {
            background: linear-gradient(135deg, var(--emerald), #047857);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(6, 95, 70, 0.2);
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }

        .btn-wa { background: #25D366; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="bg-container">
        <iframe id="ytBgIframe" src="https://www.youtube.com/embed/AjtVw2DZhWE?autoplay=1&mute=1&loop=1&playlist=AjtVw2DZhWE&controls=0&modestbranding=1&playsinline=1" frameborder="0"></iframe>
    </div>

    <div id="app">
        <div class="screen" id="screen-intro">
            <h1 class="eid-title">عيد مبارك</h1>
            <p style="letter-spacing: 5px; margin-bottom: 30px; opacity: 0.6;">EID MUBARAK</p>
            
            <div class="gift-container" onclick="startExperience()">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="giftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#059669" /><stop offset="100%" style="stop-color:#064e3b" />
                        </linearGradient>
                    </defs>
                    <rect x="40" y="80" width="120" height="100" rx="15" fill="url(#giftGrad)" />
                    <rect x="35" y="70" width="130" height="35" rx="10" fill="#10b981" />
                    <rect x="90" y="70" width="20" height="110" fill="#D4AF37" />
                    <circle cx="80" cy="65" r="15" fill="none" stroke="#D4AF37" stroke-width="8" />
                    <circle cx="120" cy="65" r="15" fill="none" stroke="#D4AF37" stroke-width="8" />
                    <circle cx="100" cy="70" r="12" fill="#F9E498" />
                    <g id="gift-face">
                        <circle cx="75" cy="130" r="6" fill="#fff" />
                        <circle cx="125" cy="130" r="6" fill="#fff" />
                        <path id="mouth" d="M 90 150 Q 100 155 110 150" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" />
                    </g>
                </svg>
            </div>

            <p style="margin: 20px 0; font-size: 0.9rem;">De la part de <strong>Safwan Taleb</strong></p>
            <button class="btn" onclick="startExperience()">🎁 OUVRIR MON CADEAU</button>
        </div>

        <div class="screen hidden" id="screen-exp">
            <div class="equalizer" id="equalizer">
                <div class="bar"></div><div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div><div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
            </div>

            <div class="msg-card">
                <p class="ar-text" id="txt-ar">جاري التحميل...</p>
                <p class="fr-text" id="txt-fr">Préparation de la surprise...</p>
            </div>
            
            <div class="gift-container" style="width: 40vw; margin-top: 30px;">
                <svg viewBox="0 0 200 200">
                    <rect x="40" y="80" width="120" height="100" rx="15" fill="#064e3b" />
                    <rect x="90" y="80" width="20" height="100" fill="#D4AF37" />
                    <g id="gift-face-mini">
                        <circle cx="75" cy="130" r="5" fill="#fff" />
                        <circle cx="125" cy="130" r="5" fill="#fff" />
                        <path id="mouth-mini" d="M 90 150 Q 100 160 110 150" stroke="#fff" stroke-width="3" fill="none" />
                    </g>
                </svg>
            </div>
        </div>

        <div class="screen hidden" id="screen-final">
            <h2 class="eid-title" style="font-size: 3.5rem;">تقبل الله منكم</h2>
            <div class="msg-card">
                <p style="font-weight: 700; color: var(--gold);">Safwan Taleb</p>
                <p>vous souhaite un merveilleux Aïd !</p>
            </div>
            <div class="actions" style="width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px;">
                <button class="btn btn-wa" onclick="shareWA()">📤 Partager sur WhatsApp</button>
                <button class="btn" style="background: none; color: var(--emerald); box-shadow: none;" onclick="location.reload()">🔄 Revoir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Utilisation de tes liens audio directs pour une qualité optimale
        const AUDIO_LINES = [
            { ar: "السلام عليكم ورحمة الله وبركاته", fr: "La paix soit sur vous", url: "https://www.genspark.ai/api/files/s/5iJprIYQ", dur: 3500 },
            { ar: "عيد مبارك سعيد لكم ولعائلتكم", fr: "Joyeux Aïd à vous et vos proches", url: "https://www.genspark.ai/api/files/s/x27R1hw1", dur: 3600 },
            { ar: "صفوان طالب يتمنى لكم كل الخير", fr: "Safwan Taleb vous souhaite le meilleur", url: "https://www.genspark.ai/api/files/s/ZQV1bgpv", dur: 2500 }
        ];

        function animateMouth(isTalking) {
            const m1 = document.getElementById('mouth');
            const m2 = document.getElementById('mouth-mini');
            if (isTalking) {
                this.interval = setInterval(() => {
                    const d = Math.random() > 0.5 ? "M 85 150 Q 100 170 115 150" : "M 90 150 Q 100 155 110 150";
                    m1.setAttribute('d', d); m2.setAttribute('d', d);
                }, 150);
            } else {
                clearInterval(this.interval);
            }
        }

        async function startExperience() {
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-exp').classList.remove('hidden');
            document.getElementById('equalizer').classList.add('active');

            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#D4AF37', '#065f46'] });

            for (let line of AUDIO_LINES) {
                document.getElementById('txt-ar').innerText = line.ar;
                document.getElementById('txt-fr').innerText = line.fr;
                
                const audio = new Audio(line.url);
                audio.play();
                animateMouth(true);
                
                await new Promise(r => setTimeout(r, line.dur));
                animateMouth(false);
            }

            showFinal();
        }

        function showFinal() {
            document.getElementById('screen-exp').classList.add('hidden');
            document.getElementById('screen-final').classList.remove('hidden');
            confetti({ particleCount: 200, spread: 160, origin: { y: 0.3 } });
        }

        function shareWA() {
            const text = encodeURIComponent("🌙 Regardez ce cadeau spécial de l'Aïd de la part de Safwan Taleb : " + window.location.href);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
