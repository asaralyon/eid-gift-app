<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eid Mubarak • Safwan Taleb</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F9E29C;
            --navy: #020617;
            --emerald: #064e3b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background: var(--navy); 
            font-family: 'Tajawal', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        /* FOND ANIMÉ AVEC MOTIFS ISLAMIQUES */
        #bg-canvas {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .pattern-overlay {
            position: fixed; inset: 0; z-index: 2; opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l8 28h28l-22 18 8 28-22-18-22 18 8-28-22-18h28z' fill='%23D4AF37'/%3E%3C/svg%3E");
            background-size: 100px;
        }

        /* LUNE ET ÉTOILES */
        .moon {
            position: absolute; top: 40px; right: 10%; width: 70px; height: 70px;
            filter: drop-shadow(0 0 20px var(--gold-light));
            z-index: 5; animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* LANTERNES (PHANNOUS) */
        .lantern {
            position: absolute; top: -10px; z-index: 10;
            filter: drop-shadow(0 0 15px var(--gold));
            animation: swing 4s ease-in-out infinite;
            transform-origin: top center;
        }
        .lantern-l { left: 10%; width: 50px; }
        .lantern-r { right: 15%; width: 65px; animation-delay: -1.5s; }

        @keyframes swing {
            0%, 100% { transform: rotate(-4deg); }
            50% { transform: rotate(4deg); }
        }

        /* CADRE VIDÉO STYLE SMARTPHONE/TABLEAU LUXE */
        .video-container {
            position: relative; z-index: 20;
            width: 300px; height: 533px; /* Ratio 9:16 */
            border: 6px solid var(--gold);
            border-radius: 45px;
            background: #000;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(0,0,0,1);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        video {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 38px;
        }

        /* BOUTON ET TEXTES */
        .overlay-ui {
            position: absolute; inset: 0; z-index: 30;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
        }

        .overlay-ui.hidden { opacity: 0; pointer-events: none; }

        .btn-start {
            background: linear-gradient(135deg, var(--gold), #b8860b);
            color: white; border: 2px solid var(--gold-light);
            padding: 18px 35px; border-radius: 50px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-start:hover { transform: scale(1.1); }

        .eid-title {
            margin-top: 25px; color: var(--gold);
            font-family: 'Amiri', serif; font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        /* EFFET DE PLUIE D'OR (CONFETTIS) */
        #confetti {
            position: fixed; inset: 0; z-index: 25; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>
    <div class="pattern-overlay"></div>

    <svg class="moon" viewBox="0 0 100 100">
        <path d="M50 10 A40 40 0 1 0 90 50 A30 30 0 1 1 50 10" fill="#F9E29C" />
    </svg>

    <svg class="lantern lantern-l" viewBox="0 0 50 100">
        <rect x="22" y="0" width="6" height="30" fill="var(--gold)"/>
        <path d="M10 30 L40 30 L45 50 L35 80 L15 80 L5 50 Z" fill="var(--gold)" opacity="0.8"/>
        <circle cx="25" cy="55" r="8" fill="white">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
        </circle>
    </svg>

    <svg class="lantern lantern-r" viewBox="0 0 50 100">
        <rect x="22" y="0" width="6" height="40" fill="var(--gold)"/>
        <path d="M10 40 L40 40 L45 60 L35 90 L15 90 L5 60 Z" fill="var(--gold)" opacity="0.8"/>
        <circle cx="25" cy="65" r="10" fill="white">
            <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" />
        </circle>
    </svg>

    <div class="video-container" id="mainFrame">
        <video id="eidVideo" playsinline>
            <source src="Vœux de l'Aïd - Safwan Taleb_720p_caption.mp4" type="video/mp4">
            Votre navigateur ne supporte pas la vidéo.
        </video>

        <div class="overlay-ui" id="ui">
            <button class="btn-start" onclick="playGift()">✨ افتح التهنئة • Ouvrir les vœux</button>
            <h1 class="eid-title">عيد مبارك</h1>
            <p style="color:white; opacity:0.7; margin-top:10px;">Safwan Taleb • صفوان طالب</p>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        function playGift() {
            const video = document.getElementById('eidVideo');
            const ui = document.getElementById('ui');
            
            // Masquer l'interface et lancer la vidéo
            ui.classList.add('hidden');
            video.play();

            // Lancer les confettis dorés
            startConfetti();
        }

        // Système de confettis simple pour l'effet de fête
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function startConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 5 + 2,
                    speed: Math.random() * 3 + 2,
                    color: i % 2 === 0 ? '#D4AF37' : '#F9E29C'
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                if(p.y > canvas.height) p.y = -10;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateConfetti);
        }

        // Gérer le redimensionnement
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
